#
# Minimal CitrineOS reference rig for OCTANE integration tests.
# Pinned to CitrineOS v1.9.0 (commit 5925f33b2839de60c68c4a029e6d2389fbe002c4).
#
# The OCPP WebSocket endpoint is reachable at ws://localhost:9210
# after `docker compose up --wait`.

services:
  amqp-broker:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 15s

  ocpp-db:
    image: postgis/postgis:16-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: citrine
      POSTGRES_USER: citrine
      POSTGRES_PASSWORD: "citrine"
    healthcheck:
      test: "pg_isready --username=citrine"
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin
      "

  citrine:
    image: ghcr.io/citrineos/citrineos-server:v1.9.0
    environment:
      APP_NAME: "all"
      APP_ENV: "docker"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      DB_STRATEGY: "migrate"
      BOOTSTRAP_CITRINEOS_DATABASE_HOST: "ocpp-db"
      BOOTSTRAP_CITRINEOS_CONFIG_FILENAME: "config.json"
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_TYPE: "local"
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_LOCAL_DEFAULT_FILE_PATH: "/data"
      CONFIG_CITRINEOS_WIPE_FILE_ON_START: "true"
    depends_on:
      ocpp-db:
        condition: service_healthy
      amqp-broker:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      # OCPP WebSocket endpoint mapped to the predictable local port for OCTANE tests.
      # Tests connect to ws://localhost:9210/<chargepoint-id>
      - "9210:8080"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          node -e "
          const net = require('net');
          const c = net.createConnection(8080, '127.0.0.1', () => { c.end(); process.exit(0); });
          c.on('error', () => process.exit(1));
          c.setTimeout(5000, () => { c.destroy(); process.exit(1); });
          "
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
