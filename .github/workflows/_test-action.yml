# _test-action.yml — Smoke test for the published octane-action.
#
# Internal workflow (underscore prefix). Verifies:
#   1. entrypoint.sh is syntactically valid (bash -n).
#   2. The Docker image builds successfully (with repo-root context).
#   3. The octane binary starts and responds to --help.
#   4. entrypoint.sh is actually invoked correctly via the container
#      default ENTRYPOINT (execute-bit + bash shebang check).
#
# A live CSMS is NOT required; this is a build + syntax smoke test only.
# Full conformance coverage is gated by the reference.yml workflow.

name: "action smoke test"

on:
  push:
    branches: [main, "releases/**"]
    paths:
      - "action/**"
      - "cmd/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/_test-action.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  action-smoke:
    name: "Build & syntax-check octane-action"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.0.2
        with:
          go-version: "1.26.2"
          cache: true

      - name: Syntax-check entrypoint.sh
        run: bash -n action/entrypoint.sh

      - name: Verify entrypoint.sh is executable
        run: |
          mode="$(git ls-files -s action/entrypoint.sh | awk '{print $1}')"
          if [ "${mode}" != "100755" ]; then
            echo "ERROR: action/entrypoint.sh is not executable (mode=${mode})"
            echo "Fix: git update-index --chmod=+x action/entrypoint.sh"
            exit 1
          fi
          echo "OK: entrypoint.sh is executable (mode=${mode})"

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t octane-action:smoke \
            -f action/Dockerfile \
            .

      - name: Verify octane binary starts
        run: |
          docker run --rm --entrypoint /usr/local/bin/octane octane-action:smoke --help

      - name: Verify entrypoint.sh executes via container default ENTRYPOINT
        run: |
          # Pass INPUT_STORIES to a non-existent path with fail-on=never so
          # octane exits 0 (no stories found is a valid empty run).
          docker run --rm \
            -e INPUT_STORIES="no-such-dir/" \
            -e INPUT_FAIL_ON="never" \
            octane-action:smoke || true
          echo "entrypoint.sh invocation completed (exit code suppressed)"
