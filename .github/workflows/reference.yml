name: reference

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "pkg/**"
      - "cmd/**"
      - "internal/**"
      - "test/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/reference.yml"

permissions:
  contents: read

concurrency:
  group: reference-${{ github.ref }}
  cancel-in-progress: true

jobs:
  citrineos:
    name: Run suite vs pinned CitrineOS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Read pinned CitrineOS commit
        id: pin
        run: |
          pin="$(cat test/reference/citrineos.version)"
          echo "commit=${pin}" >> "$GITHUB_OUTPUT"
          echo "Pinned CitrineOS commit: ${pin}"

      - name: Run reference suite
        run: make test-reference

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reference-report-${{ github.sha }}
          path: |
            report.json
            test/reference/logs/
          retention-days: 14
