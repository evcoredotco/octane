name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --config golangci.yml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests with coverage
        run: |
          mkdir -p reports
          go test -mod=readonly \
            -coverpkg=$(go list ./... | grep -v -e /tests -e tests_ | tr '\n' ',' | sed 's/,$//') \
            -coverprofile=reports/coverage.out \
            -v ./... | tee reports/test.txt
          go tool cover -func=reports/coverage.out | tail -1 | awk -F" " '{print $NF}'

      - name: Example tests
        run: go test -mod=readonly -v -run '^Example' ./...

      - name: Upload reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reports
          path: reports/

