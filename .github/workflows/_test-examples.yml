# _test-examples.yml — Validate example CI workflow files (T-006-60).
#
# Internal workflow (underscore prefix). Verifies:
#   1. The GitHub Actions example is syntactically valid (actionlint).
#   2. The GitLab CI example contains required structural keys.
#   3. No example file references --report-dir (reserved for spec 007).
#   4. The action Docker image builds and the binary starts.
#
# A live CSMS is NOT required. Full conformance coverage is gated by
# reference.yml.

name: "example validation"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-examples:
    name: "Validate example CI files"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Lint example workflows
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          files: "examples/ci/github-actions/*.yml"

      - name: Validate GitLab CI example structure
        run: |
          python3 -c "
          import sys
          with open('examples/ci/gitlab-ci/.gitlab-ci.yml') as f:
              content = f.read()
          assert 'stages:' in content, 'missing stages:'
          assert 'conformance' in content, 'missing conformance stage'
          assert 'OCTANE_IMAGE' in content, 'missing OCTANE_IMAGE variable'
          assert 'octane run' in content, 'missing octane run call'
          print('GitLab CI example structural checks passed')
          "

      - name: Check no pending-spec flags used
        run: |
          if grep -r -- '--report-dir' examples/ci/; then
            echo "ERROR: examples reference --report-dir which is not yet implemented (spec 007)"
            exit 1
          fi
          echo "OK: no pending flags found"

  smoke-action-build:
    name: "Build action image and verify binary"
    runs-on: ubuntu-latest
    needs: [validate-examples]

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.0.2
        with:
          go-version: "1.26"
          cache: true

      - name: Build action image
        run: |
          docker build --platform linux/amd64 -t octane-action:ci-test -f action/Dockerfile .

      - name: Verify binary runs
        run: |
          docker run --rm --entrypoint /usr/local/bin/octane octane-action:ci-test --help
