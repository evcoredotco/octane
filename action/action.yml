name: "OCTANE — OCPP Conformance Check"
description: >
  Run OCTANE against a CSMS endpoint and produce a deterministic OCPP
  conformance report. Supports OCPP 1.6J.
author: "The OCTANE Authors"
branding:
  icon: zap
  color: green

inputs:
  stories:
    description: "Path or glob of .story files to run (e.g. 'scenarios/' or 'scenarios/boot*.story')."
    required: true
    default: "scenarios/"
  fail-on:
    description: >
      Severity threshold that causes the action to exit non-zero:
      'any', 'major', 'minor', 'info', or 'never'.
    required: false
    default: "major"
  config:
    description: "Path to octane.yml configuration file."
    required: false
    default: "octane.yml"
  cache-dir:
    description: "Cache directory override. Defaults to OCTANE_CACHE_DIR env var or XDG cache location."
    required: false
    default: ""
  report-dir:
    description: "Output directory for generated reports."
    required: false
    default: "reports/"
  ocpp-version:
    description: "Restrict run to stories declaring this OCPP version (e.g. '1.6')."
    required: false
    default: ""
  shard:
    description: "Shard index in 'N/M' format to split stories across parallel CI workers (e.g. '1/4')."
    required: false
    default: ""
  max-parallel:
    description: "Maximum number of stories to run concurrently."
    required: false
    default: "1"
  no-cache:
    description: "Set to 'true' to bypass the result cache entirely."
    required: false
    default: "false"
  insecure-skip-verify:
    description: "Set to 'true' to disable TLS certificate verification (WARNING: insecure, not for production)."
    required: false
    default: "false"

outputs:
  report-path:
    description: "Path to the directory containing generated reports."
  exit-code:
    description: "Numeric exit code returned by the octane run command."

runs:
  using: "docker"
  # Reference the pre-built GHCR image so GitHub's runner does not
  # attempt to build the Dockerfile (which requires repo-root context
  # that is unavailable when action.yml is the build context root).
  # The image is published by release.yml on every vX.Y.Z tag push.
  image: "docker://ghcr.io/evcoreco/octane:v0"
  entrypoint: "/entrypoint.sh"
